<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Team Lid Web</title>
    <style>
      :root {
        --bg: #f2f5f8;
        --bg-2: #dfe8ef;
        --card: rgba(255, 255, 255, 0.9);
        --text: #1f2a37;
        --muted: #5a6777;
        --line: rgba(32, 44, 60, 0.15);
        --brand: #0f6ebf;
        --ok: #0b8e5f;
        --bad: #c93535;
      }
      [data-theme="dark"] {
        --bg: #0f141b;
        --bg-2: #172331;
        --card: rgba(15, 20, 27, 0.82);
        --text: #e6edf5;
        --muted: #a6b4c4;
        --line: rgba(226, 235, 247, 0.15);
        --brand: #3ea2ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--text);
        font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(circle at 15% 10%, var(--bg-2), var(--bg));
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 20px;
      }
      .panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      .tabs {
        display: flex;
        width: fit-content;
        border: 1px solid var(--line);
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.2);
        margin: 0 auto 14px;
      }
      .tab {
        border: 0;
        padding: 10px 18px;
        cursor: pointer;
        background: transparent;
        color: var(--text);
        font-weight: 600;
      }
      .tab.active { background: var(--brand); color: #fff; }
      .card {
        padding: 16px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: var(--card);
        backdrop-filter: blur(6px);
        width: min(1100px, 100%);
      }
      .grid { display: grid; gap: 12px; }
      .g2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .g4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      input[type="date"],
      input[type="text"],
      input[type="password"],
      select,
      button {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
        color: var(--text);
      }
      input[type="range"] {
        width: 100%;
      }
      input[type="checkbox"] {
        width: auto;
        margin: 0;
      }
      [data-theme="dark"] input,
      [data-theme="dark"] select,
      [data-theme="dark"] button {
        background: rgba(22, 29, 39, 0.75);
      }
      button.primary {
        background: var(--brand);
        color: #fff;
        border-color: var(--brand);
        font-weight: 700;
      }
      button.secondary { font-weight: 600; }
      .muted { color: var(--muted); font-size: 13px; }
      .err { color: var(--bad); font-weight: 600; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 8px; border-bottom: 1px solid var(--line); text-align: left; font-size: 14px; }
      .row { display: flex; gap: 10px; align-items: center; }
      .row.wrap { flex-wrap: wrap; }
      .hidden { display: none !important; }
      .manager-block summary { cursor: pointer; font-weight: 700; margin-bottom: 8px; }
      .stages-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 12px;
      }
      .stages-grid label {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.35);
      }
      [data-theme="dark"] .stages-grid label {
        background: rgba(22, 29, 39, 0.45);
      }
      .stages-grid input {
        width: auto;
        margin: 0;
      }
      @media (max-width: 900px) {
        .g2, .g4 { grid-template-columns: 1fr; }
        .stages-grid { grid-template-columns: 1fr; }
        .row { flex-wrap: wrap; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="tabs">
        <button class="tab active" data-tab="exchange">Обмін</button>
        <button class="tab" data-tab="data">Дані</button>
        <button class="tab" data-tab="settings">Налаштування</button>
      </div>

      <section id="exchange" class="panel">
        <div class="card grid g2">
          <label>Період від <input id="from" type="date" /></label>
          <label>Період до <input id="to" type="date" /></label>

          <div style="grid-column:1/-1;">
            <b>Швидкий період</b>
            <div class="row" style="margin-top:8px;">
              <button id="preset1" type="button" class="secondary">1 день</button>
              <button id="preset3" type="button" class="secondary">3 дні</button>
              <button id="preset7" type="button" class="secondary">7 днів</button>
              <button id="presetCustom" type="button" class="secondary">Кастом</button>
            </div>
          </div>
          <div>
            <b>Менеджери</b>
            <div><label><input type="checkbox" class="mgr" value="13" checked /> Рифяк Сільвія</label></div>
            <div><label><input type="checkbox" class="mgr" value="9" checked /> Сулима Ліля</label></div>
            <div><label><input type="checkbox" class="mgr" value="37" checked /> Оксана Ящишин</label></div>
            <div><label><input type="checkbox" class="mgr" value="12" checked /> Кошик Наталія</label></div>
          </div>
          <div class="row" style="align-self:end;">
            <button id="sync" class="primary">Оновити дані</button>
          </div>
        </div>
        <div class="card">
          <div><b>Статус:</b> <span id="status">Готово</span></div>
          <div id="error" class="err"></div>
        </div>
      </section>

      <section id="data" class="panel hidden">
        <div class="card grid g2">
          <label>Показувати угоди: від <input id="dataFrom" type="date" /></label>
          <label>Показувати угоди: до <input id="dataTo" type="date" /></label>
          <div style="grid-column:1/-1;">
            <div class="row" style="justify-content:space-between; margin-bottom:8px;">
              <b>Етапи</b>
              <div class="row">
                <button id="stagesAll" type="button" class="secondary">Усі</button>
                <button id="stagesClear" type="button" class="secondary">Очистити</button>
              </div>
            </div>
            <div id="stages" class="stages-grid"></div>
          </div>
        </div>

        <div class="card grid g4" id="summary"></div>
        <div class="card">
          <h3>Менеджер | К-сть угод | Сума | Успішні | Неуспішні</h3>
          <table>
            <thead>
              <tr><th>Менеджер</th><th>Угод</th><th>Сума</th><th>Успішні</th><th>Неуспішні</th></tr>
            </thead>
            <tbody id="managerRows"></tbody>
          </table>
        </div>
        <div class="card" id="managerDeals"></div>
      </section>

      <section id="settings" class="panel hidden">
        <div class="card grid g2">
          <label>
            Токен KeepinCRM (встановлено розробником)
            <input id="token" type="password" value="****************" readonly autocomplete="off" />
          </label>
          <label>
            Тема
            <select id="theme">
              <option value="system">Системна</option>
              <option value="light">Світла</option>
              <option value="dark">Темна</option>
            </select>
          </label>
          <label>
            Прозорість панелей: <span id="opacityValue">90%</span>
            <input id="opacity" type="range" min="15" max="100" value="90" />
          </label>
          <label>
            Автообмін
            <select id="autosync">
              <option value="0">Вимкнено</option>
              <option value="15">Кожні 15 хв</option>
              <option value="30">Кожні 30 хв</option>
              <option value="60">Кожну 1 годину</option>
            </select>
          </label>
          <label style="display:flex;align-items:end;gap:8px;">
            <input id="notify" type="checkbox" style="width:auto;" /> Сповіщення про завершення обміну
          </label>
          <div>
            <b>Звук сповіщення</b>
            <div class="row" style="margin-top:8px;">
              <button id="soundPick" type="button" class="secondary">Обрати звук</button>
              <button id="soundClear" type="button" class="secondary">Скинути звук</button>
              <button id="soundTest" type="button" class="secondary">Тест</button>
            </div>
            <input id="soundInput" type="file" accept="audio/*" class="hidden" />
          </div>
          <div>
            <b>Фон</b>
            <div class="row" style="margin-top:8px;">
              <button id="bgPick" type="button" class="secondary">Обрати фото фону</button>
              <button id="bgClear" type="button" class="secondary">Скинути фон</button>
            </div>
            <input id="bgInput" type="file" accept="image/*" class="hidden" />
          </div>
        </div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
