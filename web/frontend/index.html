<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM Team Lid Web</title>
    <style>
      :root {
        --bg: #f2f5f8;
        --bg-2: #dfe8ef;
        --card: rgba(255, 255, 255, 0.9);
        --text: #1f2a37;
        --muted: #5a6777;
        --line: rgba(32, 44, 60, 0.15);
        --brand: #0f6ebf;
        --ok: #0b8e5f;
        --bad: #c93535;
      }
      [data-theme="dark"] {
        --bg: #0f141b;
        --bg-2: #172331;
        --card: rgba(15, 20, 27, 0.82);
        --text: #e6edf5;
        --muted: #a6b4c4;
        --line: rgba(226, 235, 247, 0.15);
        --brand: #3ea2ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--text);
        font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
        font-size: 16px;
        background: radial-gradient(circle at 15% 10%, var(--bg-2), var(--bg));
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 20px;
      }
      .panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }
      .tabs {
        display: flex;
        width: fit-content;
        border: 1px solid var(--line);
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.2);
        margin: 0 auto 14px;
      }
      .tab {
        border: 0;
        padding: 10px 18px;
        cursor: pointer;
        background: transparent;
        color: var(--text);
        font-weight: 600;
      }
      .tab.active { background: var(--brand); color: #fff; }
      .card {
        padding: 16px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: var(--card);
        backdrop-filter: blur(6px);
        width: min(1100px, 100%);
      }
      .grid { display: grid; gap: 12px; }
      .grid > * { min-width: 0; }
      .g2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .g4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      input[type="date"],
      input[type="text"],
      input[type="password"],
      select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
        color: var(--text);
        max-width: 100%;
      }
      input[type="date"] {
        min-width: 0;
        display: block;
        -webkit-appearance: none;
        appearance: none;
      }
      label {
        display: block;
        min-width: 0;
      }
      button {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
        color: var(--text);
      }
      textarea {
        width: 100%;
        min-height: 72px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
        color: var(--text);
        resize: vertical;
      }
      .plan-metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px 12px;
      }
      .plan-metrics label {
        margin: 0;
      }
      .plan-section-title {
        margin: 8px 0 4px;
        font-weight: 700;
      }
      input[type="range"] {
        width: 100%;
      }
      input[type="checkbox"] {
        width: auto;
        margin: 0;
      }
      [data-theme="dark"] input,
      [data-theme="dark"] select,
      [data-theme="dark"] button,
      [data-theme="dark"] textarea {
        background: rgba(22, 29, 39, 0.75);
      }
      button.primary {
        background: var(--brand);
        color: #fff;
        border-color: var(--brand);
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary {
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.06s ease;
      }
      button.secondary:hover {
        background: rgba(15, 110, 191, 0.12);
        border-color: rgba(15, 110, 191, 0.4);
      }
      button.secondary:active {
        transform: translateY(1px);
      }
      button.secondary.preset-active {
        background: var(--brand);
        color: #fff;
        border-color: var(--brand);
      }
      .muted { color: var(--muted); font-size: 13px; }
      .err { color: var(--bad); font-weight: 600; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 8px; border-bottom: 1px solid var(--line); text-align: left; font-size: 14px; }
      .table-wrap {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-x: contain;
      }
      .table-wrap table {
        min-width: 620px;
      }
      .row { display: flex; gap: 10px; align-items: center; }
      .row.wrap { flex-wrap: wrap; }
      .hidden { display: none !important; }
      .auth-box {
        max-width: 480px;
        margin: 30px auto;
      }
      .auth-switch {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }
      .top-bar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 8px;
      }
      .top-user {
        font-size: 13px;
        color: var(--muted);
      }
      .manager-block summary { cursor: pointer; font-weight: 700; margin-bottom: 8px; }
      #managerDeals .table-wrap table {
        min-width: 680px;
      }
      .stages-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 12px;
      }
      .stages-grid label {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.35);
      }
      [data-theme="dark"] .stages-grid label {
        background: rgba(22, 29, 39, 0.45);
      }
      .stages-grid input {
        width: auto;
        margin: 0;
      }
      @media (max-width: 900px) {
        .wrap { padding: 14px; }
        .g2, .g4 { grid-template-columns: 1fr; }
        .plan-metrics { grid-template-columns: 1fr 1fr; }
        .stages-grid { grid-template-columns: 1fr; }
        .row { flex-wrap: wrap; }
        .card { padding: 14px; border-radius: 14px; }
        .tabs { margin-bottom: 10px; }
        th, td { font-size: 13px; padding: 6px; }
        .tabs .tab { padding: 8px 12px; font-size: 13px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section id="authGate" class="panel auth-box">
        <div class="card">
          <div class="auth-switch">
            <button id="authModeLogin" type="button" class="secondary preset-active">Вхід</button>
            <button id="authModeRegister" type="button" class="secondary">Реєстрація</button>
          </div>
          <div class="grid">
            <label id="authNameWrap" class="hidden">Ім'я
              <input id="authName" type="text" placeholder="Ім'я" />
            </label>
            <label>Email
              <input id="authEmail" type="text" placeholder="you@example.com" />
            </label>
            <label>Пароль
              <input id="authPassword" type="password" placeholder="мінімум 6 символів" />
            </label>
            <button id="authSubmit" class="primary">Увійти</button>
            <div id="authError" class="err"></div>
          </div>
        </div>
      </section>

      <div id="appRoot" class="hidden">
      <div class="top-bar">
        <div class="row">
          <span id="authUser" class="top-user"></span>
          <button id="logoutBtn" type="button" class="secondary">Вийти</button>
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="exchange">Обмін</button>
        <button class="tab" data-tab="data">Дані</button>
        <button class="tab" data-tab="plan">План</button>
        <button class="tab" data-tab="settings">Налаштування</button>
      </div>

      <section id="exchange" class="panel">
        <div class="card grid g2">
          <label>Період від <input id="from" type="date" /></label>
          <label>Період до <input id="to" type="date" /></label>

          <div style="grid-column:1/-1;">
            <b>Швидкий період</b>
            <div class="row" style="margin-top:8px;">
              <button id="preset1" type="button" class="secondary">1 день</button>
              <button id="preset3" type="button" class="secondary">3 дні</button>
              <button id="preset7" type="button" class="secondary">7 днів</button>
              <button id="presetCustom" type="button" class="secondary">Кастом</button>
            </div>
          </div>
          <div>
            <b>Менеджери</b>
            <div><label><input type="checkbox" class="mgr" value="13" checked /> Рифяк Сільвія</label></div>
            <div><label><input type="checkbox" class="mgr" value="9" checked /> Сулима Ліля</label></div>
            <div><label><input type="checkbox" class="mgr" value="37" checked /> Оксана Ящишин</label></div>
            <div><label><input type="checkbox" class="mgr" value="12" checked /> Кошик Наталія</label></div>
          </div>
          <div class="row" style="align-self:end;">
            <button id="sync" class="primary">Оновити дані</button>
          </div>
        </div>
        <div class="card">
          <div><b>Статус:</b> <span id="status">Готово</span></div>
          <div id="error" class="err"></div>
        </div>
      </section>

      <section id="data" class="panel hidden">
        <div class="card grid g2">
          <label>Показувати угоди: від <input id="dataFrom" type="date" /></label>
          <label>Показувати угоди: до <input id="dataTo" type="date" /></label>
          <div style="grid-column:1/-1;">
            <div class="row" style="justify-content:space-between; margin-bottom:8px;">
              <b>Етапи</b>
              <div class="row">
                <button id="stagesAll" type="button" class="secondary">Усі</button>
                <button id="stagesClear" type="button" class="secondary">Очистити</button>
              </div>
            </div>
            <div id="stages" class="stages-grid"></div>
          </div>
        </div>

        <div class="card grid g4" id="summary"></div>
        <div class="card">
          <h3>Менеджер | К-сть угод | Сума | Успішні | Неуспішні</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Менеджер</th><th>Угод</th><th>Сума</th><th>Успішні</th><th>Неуспішні</th></tr>
              </thead>
              <tbody id="managerRows"></tbody>
            </table>
          </div>
        </div>
        <div class="card" id="managerDeals"></div>
      </section>

      <section id="plan" class="panel hidden">
        <div class="card grid g2">
          <label>
            Тип плану
            <select id="planPeriodType">
              <option value="week">Тиждень</option>
              <option value="month">Місяць</option>
            </select>
          </label>
          <label id="planWeekWrap">
            Тиждень (дата всередині періоду)
            <input id="planWeekDate" type="date" />
          </label>
          <label id="planMonthWrap" class="hidden">
            Місяць
            <div class="row">
              <select id="planMonthSelect">
                <option value="01">Січень</option>
                <option value="02">Лютий</option>
                <option value="03">Березень</option>
                <option value="04">Квітень</option>
                <option value="05">Травень</option>
                <option value="06">Червень</option>
                <option value="07">Липень</option>
                <option value="08">Серпень</option>
                <option value="09">Вересень</option>
                <option value="10">Жовтень</option>
                <option value="11">Листопад</option>
                <option value="12">Грудень</option>
              </select>
              <input id="planMonthYear" type="number" min="2020" max="2100" step="1" />
            </div>
          </label>
          <div class="row" style="align-self:end;">
            <button id="planLoad" type="button" class="secondary">Завантажити</button>
            <button id="planSave" type="button" class="primary">Зберегти план</button>
          </div>
          <div id="planStatusTop" class="muted" style="align-self:end;">План не завантажено</div>
        </div>

        <div class="card">
          <h3 id="planTitle" style="margin-top:0;">Щотижневий звіт Team Lead</h3>
          <div class="plan-metrics">
            <label>План на тиждень, UAH
              <input id="planGlobalWeek" type="text" placeholder="0" />
            </label>
            <label>План на місяць, UAH
              <input id="planGlobalMonth" type="text" placeholder="0" />
            </label>
            <label>Сума план, UAH
              <input id="planMetricSumPlan" type="text" placeholder="0" />
            </label>
            <label>Успішні замовлення план, шт
              <input id="planMetricSuccessfulPlan" type="text" placeholder="0" />
            </label>
            <label>Відмови план, шт
              <input id="planMetricRefusalsPlan" type="text" placeholder="0" />
            </label>
            <label>Реквізити план, шт
              <input id="planMetricRequisitesPlan" type="text" placeholder="0" />
            </label>
            <label>Пропозиції план, шт
              <input id="planMetricProposalsPlan" type="text" placeholder="0" />
            </label>
            <label>Телефонні розмови план, шт
              <input id="planMetricCallsPlan" type="text" placeholder="0" />
            </label>
            <label>Нові ліди план, шт
              <input id="planMetricLeadsPlan" type="text" placeholder="0" />
            </label>
            <label>Реактивація план, шт
              <input id="planMetricReactivationPlan" type="text" placeholder="0" />
            </label>
            <label>Конверсія план, %
              <input id="planMetricConversionPlan" type="text" placeholder="0" />
            </label>
          </div>
        </div>

        <div class="card">
          <div class="plan-metrics">
            <label style="grid-column: span 2;">Обери менеджера
              <select id="planManagerSelect">
                <option value="13">Рифяк Сільвія</option>
                <option value="9">Сулима Ліля</option>
                <option value="37">Оксана Ящишин</option>
                <option value="12">Кошик Наталія</option>
              </select>
            </label>
            <label style="grid-column: span 2;">Виконано плану, %
              <input id="planManagerCompletion" type="text" readonly value="0" />
            </label>
            <label>Сума факт, UAH
              <input id="planMetricSumFact" type="text" placeholder="0" />
            </label>
            <label>Успішні замовлення факт, шт
              <input id="planMetricSuccessfulFact" type="text" placeholder="0" />
            </label>
            <label>Відмови факт, шт
              <input id="planMetricRefusalsFact" type="text" placeholder="0" />
            </label>
            <label>Реквізити факт, шт
              <input id="planMetricRequisitesFact" type="text" placeholder="0" />
            </label>
            <label>Пропозиції факт, шт
              <input id="planMetricProposalsFact" type="text" placeholder="0" />
            </label>
            <label>Телефонні розмови факт, шт
              <input id="planMetricCallsFact" type="text" placeholder="0" />
            </label>
            <label>Нові ліди факт, шт
              <input id="planMetricLeadsFact" type="text" placeholder="0" />
            </label>
            <label>Реактивація факт, шт
              <input id="planMetricReactivationFact" type="text" placeholder="0" />
            </label>
            <label>Конверсія факт, %
              <input id="planMetricConversionFact" type="text" placeholder="0" />
            </label>
          </div>
        </div>

        <div class="card">
          <div class="grid">
            <label>2. Найважча ситуація
              <textarea id="planHardSituation"></textarea>
            </label>
            <label>3. Як я вирішив її
              <textarea id="planSolvedHow"></textarea>
            </label>
            <label>4. Успішна дія / героїчний вчинок
              <textarea id="planHeroAction"></textarea>
            </label>
            <label>5. Висновки за період
              <textarea id="planConclusions"></textarea>
            </label>
            <label>6. Задачі на наступний період
              <textarea id="planNextTasks"></textarea>
            </label>
            <label>7. План команди та особистий на наступний період
              <textarea id="planNextPlan"></textarea>
            </label>
          </div>
          <div id="planStatus" class="muted" style="margin-top:10px;">План не завантажено</div>
        </div>
      </section>

      <section id="settings" class="panel hidden">
        <div class="card grid g2">
          <label>
            Токен KeepinCRM (встановлено розробником)
            <input id="token" type="password" value="****************" readonly autocomplete="off" />
          </label>
          <label>
            Тема
            <select id="theme">
              <option value="system">Системна</option>
              <option value="light">Світла</option>
              <option value="dark">Темна</option>
            </select>
          </label>
          <label>
            Прозорість панелей: <span id="opacityValue">90%</span>
            <input id="opacity" type="range" min="15" max="100" value="90" />
          </label>
          <label>
            Автообмін
            <select id="autosync">
              <option value="0">Вимкнено</option>
              <option value="15">Кожні 15 хв</option>
              <option value="30">Кожні 30 хв</option>
              <option value="60">Кожну 1 годину</option>
            </select>
          </label>
          <label style="display:flex;align-items:end;gap:8px;">
            <input id="notify" type="checkbox" style="width:auto;" /> Сповіщення про завершення обміну
          </label>
          <div>
            <b>Звук сповіщення</b>
            <div class="row" style="margin-top:8px;">
              <button id="soundPick" type="button" class="secondary">Обрати звук</button>
              <button id="soundClear" type="button" class="secondary">Скинути звук</button>
              <button id="soundTest" type="button" class="secondary">Тест</button>
            </div>
            <input id="soundInput" type="file" accept="audio/*" class="hidden" />
          </div>
          <div>
            <b>Фон</b>
            <div class="row" style="margin-top:8px;">
              <button id="bgPick" type="button" class="secondary">Обрати фото фону</button>
              <button id="bgClear" type="button" class="secondary">Скинути фон</button>
            </div>
            <input id="bgInput" type="file" accept="image/*" class="hidden" />
          </div>
        </div>

        <div id="adminUsersCard" class="card hidden">
          <div class="row" style="justify-content:space-between;">
            <h3 style="margin:0;">Зареєстровані користувачі</h3>
            <button id="usersRefresh" type="button" class="secondary">Оновити</button>
          </div>
          <div class="table-wrap" style="margin-top:10px;">
            <table>
              <thead>
                <tr><th>ID</th><th>Email</th><th>Ім'я</th><th>Роль</th><th>Статус</th><th>Створено</th></tr>
              </thead>
              <tbody id="usersRows">
                <tr><td colspan="6" class="muted">Немає даних</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
